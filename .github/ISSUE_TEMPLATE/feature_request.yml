name: Feature Request
description: Propose a new feature or improvement
labels: ["feature", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        For large features or architectural changes, consider opening a [GitHub Discussion](https://github.com/arturdonda/mnemo/discussions) first.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or pain point. Focus on the problem, not the solution.
      placeholder: "When I do X, I have to Y every time, which is tedious because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? Include example commands or output if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options:
        - FEAT Cache
        - Semantic Index
        - Structural Graph
        - MCP Server
        - Agent Install
        - CLI / Other
        - Not sure
    validations:
      required: false
