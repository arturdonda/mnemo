name: Bug Report
description: Something is not working as expected
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, run `mnemo doctor` and include the output below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `mnemo init`
        2. Run `mnemo update`
        3. Run `mnemo search "..."`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Output of `mnemo doctor`
      render: shell
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. Windows 11, macOS 15, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.4.0 (run: node --version)"
    validations:
      required: true

  - type: input
    id: mnemo
    attributes:
      label: Mnemo version
      placeholder: "e.g. 1.0.0 (run: mnemo --version)"
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer (if known)
      options:
        - FEAT Cache
        - Semantic Index
        - Structural Graph
        - MCP Server
        - Agent Install
        - CLI / Other
        - Not sure
    validations:
      required: false
